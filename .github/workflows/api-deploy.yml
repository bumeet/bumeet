name: API — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'platform/apps/api/**'
      - 'platform/package.json'
      - 'platform/pnpm-lock.yaml'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

env:
  ACR_REGISTRY: acrbumeetdev.azurecr.io
  IMAGE_NAME: bumeet-api
  APP_NAME: app-bumeet-dev-api

jobs:
  build-and-deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR via Azure CLI
        run: az acr login --name acrbumeetdev

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: platform
          file: platform/apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ steps.meta.outputs.tag }}
