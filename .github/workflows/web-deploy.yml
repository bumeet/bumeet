name: Web — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'platform/apps/web/**'
      - 'platform/package.json'
      - 'platform/pnpm-lock.yaml'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: platform/apps/web
          output_location: .next
          skip_api_build: true
        env:
          NEXT_PUBLIC_API_URL: https://app-bumeet-dev-api.azurewebsites.net/api/v1
          NEXTAUTH_URL: https://icy-hill-066964603.2.azurestaticapps.net
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_URL: https://icy-hill-066964603.2.azurestaticapps.net
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          AUTH_SLACK_ID: ${{ secrets.SLACK_CLIENT_ID }}
          AUTH_SLACK_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}

  close-pr:
    name: Close PR environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          action: close
