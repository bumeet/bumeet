name: "Web — Deploy PRODUCTION"

# Deploys to the production Azure Static Web App (custom domain) on every push
# to main that touches the web app or this workflow.
on:
  push:
    branches: [main]
    paths:
      - 'platform/apps/web/**'
      - 'platform/package.json'
      - 'platform/pnpm-lock.yaml'
      - '.github/workflows/web-deploy-prod.yml'
  workflow_dispatch:

env:
  PROD_URL: https://bumeet.es

jobs:
  deploy:
    name: "Build & Deploy to production"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps (prod)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: platform/apps/web
          output_location: .next
          skip_api_build: true
        env:
          NEXT_PUBLIC_API_URL:              https://app-bumeet-dev-api.azurewebsites.net/api/v1
          NEXTAUTH_URL:                     https://bumeet.es
          NEXTAUTH_SECRET:                  ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_SECRET:                      ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_URL:                         https://bumeet.es
          AUTH_GOOGLE_ID:                   ${{ secrets.GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_SECRET:               ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID:       ${{ secrets.MICROSOFT_CLIENT_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET:   ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          AUTH_SLACK_ID:                    ${{ secrets.SLACK_CLIENT_ID }}
          AUTH_SLACK_SECRET:                ${{ secrets.SLACK_CLIENT_SECRET }}
